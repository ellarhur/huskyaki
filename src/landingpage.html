<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huskyaki Atelier</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

</head>
<body class="has-hamburger">    
    <header>
        <button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav">
            <span class="sr-only">Meny</span>
            <span class="envelope-icon"></span>
        </button>
        <nav id="primary-nav">
            <ul>
                <li><a href="landingpage.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="work.html">work</a></li>
                <li><a href="merch.html">support</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>
<main>
    <div class="centered-content">
        <img src="img/huskyakilogo-inverted.png" alt="HUSKYAKI ATELIER">
    </div>
</main>
<footer>
    <div class="footer-content">
        <ul>
            <li><a href="#">tiktok</a></li>
            <li><a href="#">instagram</a></li>
            <li><a href="#">youtube</a></li>
        </ul>
        <div class="copyright">© 2025 Huskyaki Atelier™. All rights reserved.</div>
    </div>
</footer>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.querySelector('.nav-toggle');
  const nav = document.querySelector('#primary-nav');
  if (toggle && nav) {
    toggle.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      toggle.classList.toggle('open', open);
    });
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        nav.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.classList.remove('open');
      });
    });
  }
});
</script>
</body>
</html>
